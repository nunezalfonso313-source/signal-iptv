<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SIGNAL — IPTV</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
<style>
  :root {
    --bg:        #080a0f;
    --bg2:       #0d1017;
    --bg3:       #131720;
    --border:    #1e2530;
    --accent:    #e8c96d;
    --accent2:   #c9a84c;
    --red:       #e85555;
    --text:      #d4d8e0;
    --muted:     #5a6070;
    --panel-w:   320px;
    --epg-h:     180px;
    --header-h:  52px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px}

  /* ── GRAIN OVERLAY ── */
  body::before{
    content:'';position:fixed;inset:0;pointer-events:none;z-index:999;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    opacity:.5;
  }

  /* ── LAYOUT ── */
  #app{display:grid;height:100vh;grid-template-rows:var(--header-h) 1fr var(--epg-h);grid-template-columns:var(--panel-w) 1fr;grid-template-areas:"hd hd" "sl vp" "sl epg"}

  /* ── HEADER ── */
  header{
    grid-area:hd;display:flex;align-items:center;gap:16px;padding:0 20px;
    background:var(--bg2);border-bottom:1px solid var(--border);z-index:10;
  }
  .logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:4px;color:var(--accent);line-height:1}
  .logo span{color:var(--muted);font-size:13px;letter-spacing:2px;margin-left:6px;font-family:'JetBrains Mono',monospace}
  .search-wrap{flex:1;max-width:340px;position:relative}
  .search-wrap input{
    width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);
    padding:7px 12px 7px 34px;border-radius:4px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;
    transition:border-color .2s;
  }
  .search-wrap input:focus{border-color:var(--accent)}
  .search-wrap::before{content:'⌕';position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;pointer-events:none}
  .hdr-actions{margin-left:auto;display:flex;gap:8px}
  .btn{
    background:transparent;border:1px solid var(--border);color:var(--text);padding:6px 14px;
    border-radius:4px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;
    transition:all .2s;white-space:nowrap;
  }
  .btn:hover{border-color:var(--accent);color:var(--accent)}
  .btn.primary{background:var(--accent);color:#000;border-color:var(--accent);font-weight:500}
  .btn.primary:hover{background:var(--accent2);border-color:var(--accent2)}
  .live-dot{width:7px;height:7px;background:var(--red);border-radius:50%;box-shadow:0 0 6px var(--red);animation:pulse 1.4s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  /* ── SIDEBAR CHANNEL LIST ── */
  #sidebar{
    grid-area:sl;background:var(--bg2);border-right:1px solid var(--border);
    display:flex;flex-direction:column;overflow:hidden;
  }
  .group-tabs{display:flex;gap:0;overflow-x:auto;border-bottom:1px solid var(--border);padding:0 8px;scrollbar-width:none}
  .group-tabs::-webkit-scrollbar{display:none}
  .gtab{
    flex-shrink:0;padding:9px 12px;font-size:11px;letter-spacing:.8px;text-transform:uppercase;
    color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;font-weight:500;
  }
  .gtab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .channel-list{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
  .channel-list::-webkit-scrollbar{width:4px}
  .channel-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  .channel-item{
    display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;
    border-bottom:1px solid transparent;transition:background .15s;position:relative;
  }
  .channel-item:hover{background:var(--bg3)}
  .channel-item.active{background:var(--bg3);border-left:2px solid var(--accent)}
  .channel-item.active .ch-name{color:var(--accent)}
  .ch-logo{width:32px;height:32px;border-radius:4px;object-fit:contain;background:var(--bg3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted);overflow:hidden}
  .ch-logo img{width:100%;height:100%;object-fit:contain}
  .ch-info{flex:1;min-width:0}
  .ch-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ch-group{font-size:10px;color:var(--muted);margin-top:1px;font-family:'JetBrains Mono',monospace}
  .fav-btn{
    opacity:0;background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;
    transition:all .2s;padding:2px 4px;flex-shrink:0;
  }
  .channel-item:hover .fav-btn{opacity:1}
  .fav-btn.active{opacity:1;color:var(--accent)}
  .empty-state{padding:40px 20px;text-align:center;color:var(--muted)}
  .empty-state .icon{font-size:36px;margin-bottom:12px;display:block}

  /* ── VIDEO PLAYER ── */
  #player-area{
    grid-area:vp;background:#000;position:relative;overflow:hidden;
    display:flex;align-items:center;justify-content:center;
  }
  #video{width:100%;height:100%;object-fit:contain}
  .player-overlay{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    flex-direction:column;gap:12px;pointer-events:none;
  }
  .player-overlay.hidden{display:none}
  .overlay-icon{font-size:48px;opacity:.3}
  .overlay-text{color:var(--muted);font-size:13px;letter-spacing:.5px}
  .now-playing-bar{
    position:absolute;bottom:0;left:0;right:0;padding:10px 16px;
    background:linear-gradient(transparent,rgba(0,0,0,.85));
    display:flex;align-items:center;gap:10px;opacity:0;transition:opacity .3s;
  }
  #player-area:hover .now-playing-bar{opacity:1}
  .np-name{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:#fff}
  .np-group{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace}
  .np-live{
    margin-left:auto;display:flex;align-items:center;gap:6px;
    font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--red);
    background:rgba(232,85,85,.12);padding:3px 8px;border-radius:3px;border:1px solid rgba(232,85,85,.3);
  }
  .error-msg{
    position:absolute;bottom:60px;left:50%;transform:translateX(-50%);
    background:rgba(232,85,85,.15);border:1px solid rgba(232,85,85,.4);
    color:var(--red);padding:8px 16px;border-radius:4px;font-size:12px;
    font-family:'JetBrains Mono',monospace;pointer-events:none;opacity:0;transition:opacity .3s;
  }
  .error-msg.show{opacity:1}

  /* ── EPG BAR ── */
  #epg-area{
    grid-area:epg;background:var(--bg2);border-top:1px solid var(--border);
    overflow:hidden;display:flex;flex-direction:column;
  }
  .epg-header{
    padding:8px 16px;display:flex;align-items:center;gap:8px;
    border-bottom:1px solid var(--border);flex-shrink:0;
  }
  .epg-title{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:var(--muted)}
  .epg-ch-name{font-size:13px;font-weight:500;color:var(--accent)}
  .epg-timeline{flex:1;overflow-x:auto;display:flex;gap:2px;padding:10px 12px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;align-items:flex-start}
  .epg-timeline::-webkit-scrollbar{height:3px}
  .epg-timeline::-webkit-scrollbar-thumb{background:var(--border)}
  .epg-program{
    flex-shrink:0;background:var(--bg3);border:1px solid var(--border);border-radius:4px;
    padding:8px 10px;min-width:140px;cursor:default;transition:border-color .2s;
  }
  .epg-program.current{border-color:var(--accent);background:rgba(232,201,109,.06)}
  .epg-prog-time{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:3px}
  .epg-prog-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
  .epg-prog-desc{font-size:11px;color:var(--muted);margin-top:2px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .epg-empty{color:var(--muted);font-size:12px;padding:20px;align-self:center}
  .epg-url-wrap{display:flex;gap:6px;padding:0 12px 8px;flex-shrink:0}
  .epg-url-wrap input{
    flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--text);
    padding:5px 10px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:11px;outline:none;
    transition:border-color .2s;
  }
  .epg-url-wrap input:focus{border-color:var(--accent)}

  /* ── MODAL ── */
  .modal-bg{
    position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;
    display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);
    opacity:0;pointer-events:none;transition:opacity .25s;
  }
  .modal-bg.open{opacity:1;pointer-events:all}
  .modal{
    background:var(--bg2);border:1px solid var(--border);border-radius:8px;
    padding:28px;width:min(480px,90vw);transform:translateY(12px);transition:transform .25s;
  }
  .modal-bg.open .modal{transform:translateY(0)}
  .modal h2{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--accent);margin-bottom:20px}
  .modal label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:5px;margin-top:14px}
  .modal input,.modal textarea{
    width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);
    padding:8px 12px;border-radius:4px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;
    transition:border-color .2s;
  }
  .modal input:focus,.modal textarea:focus{border-color:var(--accent)}
  .modal textarea{resize:vertical;min-height:80px;font-family:'JetBrains Mono',monospace;font-size:11px}
  .modal-actions{display:flex;gap:8px;margin-top:20px;justify-content:flex-end}
  .modal-note{font-size:11px;color:var(--muted);margin-top:8px;line-height:1.5}
  .or-div{display:flex;align-items:center;gap:10px;margin:12px 0;color:var(--muted);font-size:11px}
  .or-div::before,.or-div::after{content:'';flex:1;height:1px;background:var(--border)}
  .drop-zone{
    border:1px dashed var(--border);border-radius:4px;padding:20px;text-align:center;
    color:var(--muted);font-size:12px;cursor:pointer;transition:all .2s;
  }
  .drop-zone:hover,.drop-zone.over{border-color:var(--accent);color:var(--accent);background:rgba(232,201,109,.04)}
  #file-input{display:none}

  /* ── TOAST ── */
  #toast{
    position:fixed;bottom:24px;right:24px;z-index:200;
    background:var(--bg3);border:1px solid var(--border);border-left:3px solid var(--accent);
    padding:10px 16px;border-radius:4px;font-size:12px;font-family:'JetBrains Mono',monospace;
    opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none;max-width:280px;
  }
  #toast.show{opacity:1;transform:translateY(0)}

  /* ── SCROLLBAR GLOBAL ── */
  ::-webkit-scrollbar{width:4px;height:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

  /* ── RESPONSIVE MÓVIL ── */
  @media(max-width:640px){
    :root{--header-h:48px;--epg-h:140px}

    #app{
      grid-template-rows:var(--header-h) auto 1fr var(--epg-h);
      grid-template-columns:1fr;
      grid-template-areas:"hd" "vp" "sl" "epg";
      height:100dvh;
      overflow-y:auto;
    }

    html,body{overflow:auto}

    header{padding:0 12px;gap:8px}
    .logo{font-size:20px}
    .logo span{display:none}
    .search-wrap{max-width:none;flex:1}
    .hdr-actions{gap:6px}
    .btn{padding:5px 10px;font-size:11px}
    #live-dot{display:none!important}

    #player-area{
      width:100%;
      aspect-ratio:16/9;
      height:auto;
    }
    #video{width:100%;height:100%;object-fit:contain}

    #sidebar{
      height:260px;
      border-right:none;
      border-top:1px solid var(--border);
    }

    .now-playing-bar{opacity:1}

    #epg-area{height:var(--epg-h)}
    .epg-url-wrap{flex-wrap:wrap}
    .epg-url-wrap input{min-width:0;flex:1}
  }
</style>
</head>
<body>

<div id="app">

  <!-- HEADER -->
  <header>
    <div class="logo">SIGNAL <span>IPTV</span></div>
    <div class="search-wrap">
      <input type="text" id="search" placeholder="Buscar canal…" autocomplete="off"/>
    </div>
    <div class="hdr-actions">
      <div class="live-dot" id="live-dot" style="display:none"></div>
      <button class="btn" id="fav-toggle">★ Favoritos</button>
      <button class="btn primary" id="load-btn">+ Cargar M3U</button>
    </div>
  </header>

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="group-tabs" id="group-tabs"></div>
    <div class="channel-list" id="channel-list">
      <div class="empty-state">
        <span class="icon">📡</span>
        <div>Carga una lista M3U<br/>para comenzar</div>
      </div>
    </div>
  </aside>

  <!-- VIDEO -->
  <div id="player-area">
    <video id="video" controls></video>
    <div class="player-overlay" id="overlay">
      <span class="overlay-icon">▶</span>
      <span class="overlay-text">Selecciona un canal</span>
    </div>
    <div class="now-playing-bar" id="npbar" style="display:none">
      <div>
        <div class="np-name" id="np-name"></div>
        <div class="np-group" id="np-group"></div>
      </div>
      <div class="np-live"><div class="live-dot"></div> EN VIVO</div>
      <button class="btn" id="fs-btn" style="margin-left:8px;font-size:16px;padding:4px 10px;" title="Pantalla completa">⛶</button>
    </div>
    <div class="error-msg" id="err-msg">Error al cargar el stream</div>
  </div>

  <!-- EPG -->
  <div id="epg-area">
    <div class="epg-header">
      <span class="epg-title">EPG</span>
      <span class="epg-ch-name" id="epg-ch-name">—</span>
    </div>
    <div class="epg-url-wrap">
      <input type="text" id="epg-url" placeholder="URL del archivo XMLTV (.xml / .gz) — opcional"/>
      <button class="btn" id="epg-load-btn">Cargar EPG</button>
    </div>
    <div class="epg-timeline" id="epg-timeline">
      <div class="epg-empty">Sin datos EPG</div>
    </div>
  </div>

</div>

<!-- MODAL CARGA M3U -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h2>Cargar Lista M3U</h2>
    <label>URL de la lista</label>
    <input type="text" id="m3u-url" placeholder="https://ejemplo.com/lista.m3u"/>
    <div class="or-div">o</div>
    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
      📂 Arrastra un archivo .m3u / .m3u8 o haz clic aquí
    </div>
    <input type="file" id="file-input" accept=".m3u,.m3u8,.txt"/>
    <div class="or-div">o pega el contenido</div>
    <label>Contenido M3U</label>
    <textarea id="m3u-text" placeholder="#EXTM3U&#10;#EXTINF:-1 tvg-name=&quot;Canal 1&quot;,Canal 1&#10;http://..."></textarea>
    <p class="modal-note">La lista se guardará en tu navegador para uso futuro.</p>
    <div class="modal-actions">
      <button class="btn" id="modal-cancel">Cancelar</button>
      <button class="btn primary" id="modal-load">Cargar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ── STATE ──
let channels = [];
let favorites = JSON.parse(localStorage.getItem('iptv_favs') || '[]');
let currentGroup = 'Todos';
let showingFavs = false;
let hls = null;
let epgData = {}; // tvgId -> [{start,stop,title,desc}]
let currentChannel = null;

// ── M3U PARSER ──
function parseM3U(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const result = [];
  let current = null;
  for (const line of lines) {
    if (line.startsWith('#EXTINF')) {
      current = { name: '', group: 'General', logo: '', tvgId: '', url: '' };
      const nameMatch = line.match(/,(.+)$/);
      if (nameMatch) current.name = nameMatch[1].trim();
      const groupMatch = line.match(/group-title="([^"]*)"/i);
      if (groupMatch) current.group = groupMatch[1] || 'General';
      const logoMatch = line.match(/tvg-logo="([^"]*)"/i);
      if (logoMatch) current.logo = logoMatch[1];
      const idMatch = line.match(/tvg-id="([^"]*)"/i);
      if (idMatch) current.tvgId = idMatch[1];
    } else if (current && !line.startsWith('#')) {
      current.url = line;
      result.push(current);
      current = null;
    }
  }
  return result;
}

// ── EPG PARSER (XMLTV) ──
async function loadEPG(url) {
  toast('Cargando EPG…');
  try {
    const res = await fetch(url);
    const text = await res.text();
    const parser = new DOMParser();
    const xml = parser.parseFromString(text, 'text/xml');
    epgData = {};
    xml.querySelectorAll('programme').forEach(p => {
      const ch = p.getAttribute('channel');
      if (!epgData[ch]) epgData[ch] = [];
      epgData[ch].push({
        start: parseEPGDate(p.getAttribute('start')),
        stop:  parseEPGDate(p.getAttribute('stop')),
        title: p.querySelector('title')?.textContent || '',
        desc:  p.querySelector('desc')?.textContent || ''
      });
    });
    toast(`EPG cargado — ${Object.keys(epgData).length} canales`);
    localStorage.setItem('iptv_epg_url', url);
    if (currentChannel) renderEPG(currentChannel);
  } catch(e) {
    toast('Error al cargar EPG');
  }
}

function parseEPGDate(s) {
  if (!s) return null;
  // Format: 20240101120000 +0000
  const m = s.match(/(\d{4})(\d{2})(\d{2})(\d{2})(\d{2})(\d{2})/);
  if (!m) return null;
  return new Date(`${m[1]}-${m[2]}-${m[3]}T${m[4]}:${m[5]}:${m[6]}Z`);
}

function renderEPG(ch) {
  const timeline = document.getElementById('epg-timeline');
  const chName = document.getElementById('epg-ch-name');
  chName.textContent = ch.name;
  const programs = epgData[ch.tvgId] || [];
  if (!programs.length) {
    timeline.innerHTML = '<div class="epg-empty">Sin datos EPG para este canal</div>';
    return;
  }
  const now = new Date();
  const fmt = d => d ? d.toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'}) : '';
  timeline.innerHTML = programs.slice(0,24).map(p => {
    const isCurrent = p.start <= now && p.stop >= now;
    return `<div class="epg-program${isCurrent?' current':''}">
      <div class="epg-prog-time">${fmt(p.start)} – ${fmt(p.stop)}</div>
      <div class="epg-prog-name">${p.title}</div>
      ${p.desc ? `<div class="epg-prog-desc">${p.desc}</div>` : ''}
    </div>`;
  }).join('');
  // scroll to current
  const cur = timeline.querySelector('.current');
  if (cur) setTimeout(() => cur.scrollIntoView({behavior:'smooth',inline:'center'}), 100);
}

// ── RENDER CHANNELS ──
function getGroups() {
  const gs = [...new Set(channels.map(c => c.group))].sort();
  return ['Todos', ...gs];
}

function filteredChannels() {
  const q = document.getElementById('search').value.toLowerCase();
  let list = showingFavs ? channels.filter(c => favorites.includes(c.url)) : channels;
  if (currentGroup !== 'Todos' && !showingFavs) list = list.filter(c => c.group === currentGroup);
  if (q) list = list.filter(c => c.name.toLowerCase().includes(q) || c.group.toLowerCase().includes(q));
  return list;
}

function renderGroups() {
  const tabs = document.getElementById('group-tabs');
  if (!channels.length) { tabs.innerHTML = ''; return; }
  tabs.innerHTML = getGroups().map(g =>
    `<div class="gtab${g === currentGroup && !showingFavs ? ' active' : ''}" data-g="${g}">${g}</div>`
  ).join('');
  tabs.querySelectorAll('.gtab').forEach(t => t.addEventListener('click', () => {
    showingFavs = false;
    currentGroup = t.dataset.g;
    document.getElementById('fav-toggle').style.color = '';
    renderGroups(); renderChannels();
  }));
}

function logoEl(ch) {
  if (ch.logo) return `<div class="ch-logo"><img src="${ch.logo}" onerror="this.parentNode.textContent='📺'" loading="lazy"/></div>`;
  return `<div class="ch-logo">📺</div>`;
}

function renderChannels() {
  const list = document.getElementById('channel-list');
  const chs = filteredChannels();
  if (!channels.length) {
    list.innerHTML = `<div class="empty-state"><span class="icon">📡</span><div>Carga una lista M3U<br/>para comenzar</div></div>`;
    return;
  }
  if (!chs.length) {
    list.innerHTML = `<div class="empty-state"><span class="icon">🔍</span><div>Sin resultados</div></div>`;
    return;
  }
  list.innerHTML = chs.map((ch, i) => {
    const isFav = favorites.includes(ch.url);
    const isActive = currentChannel && currentChannel.url === ch.url;
    return `<div class="channel-item${isActive?' active':''}" data-i="${channels.indexOf(ch)}">
      ${logoEl(ch)}
      <div class="ch-info">
        <div class="ch-name">${ch.name}</div>
        <div class="ch-group">${ch.group}</div>
      </div>
      <button class="fav-btn${isFav?' active':''}" data-url="${ch.url}" title="${isFav?'Quitar favorito':'Añadir favorito'}">★</button>
    </div>`;
  }).join('');

  list.querySelectorAll('.channel-item').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.classList.contains('fav-btn')) return;
      playChannel(channels[parseInt(el.dataset.i)]);
    });
  });
  list.querySelectorAll('.fav-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      toggleFav(btn.dataset.url);
      renderChannels();
    });
  });
}

// ── PLAY ──
function playChannel(ch) {
  currentChannel = ch;
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('npbar').style.display = 'flex';
  document.getElementById('np-name').textContent = ch.name;
  document.getElementById('np-group').textContent = ch.group;
  document.getElementById('live-dot').style.display = 'block';
  hideError();
  renderChannels();
  renderEPG(ch);

  const video = document.getElementById('video');
  if (hls) { hls.destroy(); hls = null; }

  const url = ch.url;
  if (Hls.isSupported() && (url.includes('.m3u8') || url.includes('hls') || url.includes('/live'))) {
    hls = new Hls({ enableWorker: true });
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(()=>{}));
    hls.on(Hls.Events.ERROR, (e, data) => { if (data.fatal) showError(); });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = url;
    video.play().catch(()=>{});
  } else {
    video.src = url;
    video.play().catch(()=>{});
  }
  video.onerror = () => showError();
}

function showError() {
  const e = document.getElementById('err-msg');
  e.classList.add('show');
  setTimeout(() => e.classList.remove('show'), 4000);
}
function hideError() {
  document.getElementById('err-msg').classList.remove('show');
}

// ── FAVORITES ──
function toggleFav(url) {
  if (favorites.includes(url)) favorites = favorites.filter(f => f !== url);
  else favorites.push(url);
  localStorage.setItem('iptv_favs', JSON.stringify(favorites));
}

// ── LOAD M3U ──
function loadFromText(text) {
  const parsed = parseM3U(text);
  if (!parsed.length) { toast('No se encontraron canales en la lista'); return; }
  channels = parsed;
  localStorage.setItem('iptv_channels', text);
  currentGroup = 'Todos';
  renderGroups();
  renderChannels();
  closeModal();
  toast(`✓ ${parsed.length} canales cargados`);
}

async function loadFromUrl(url) {
  toast('Descargando lista…');
  try {
    const proxy = 'https://cors-proxy.nunezalfonso313.workers.dev/?url=' + encodeURIComponent(url);
    const res = await fetch(proxy);
    if (!res.ok) throw new Error();
    const text = await res.text();
    localStorage.setItem('iptv_m3u_url', url);
    loadFromText(text);
  } catch {
    toast('Error al descargar la lista. Verifica la URL o usa CORS proxy.');
  }
}

// ── MODAL ──
function openModal() { document.getElementById('modal').classList.add('open') }
function closeModal() { document.getElementById('modal').classList.remove('open') }

document.getElementById('load-btn').addEventListener('click', openModal);
document.getElementById('modal-cancel').addEventListener('click', closeModal);
document.getElementById('modal').addEventListener('click', e => { if(e.target.id==='modal') closeModal() });

document.getElementById('modal-load').addEventListener('click', () => {
  const url = document.getElementById('m3u-url').value.trim();
  const text = document.getElementById('m3u-text').value.trim();
  if (url) loadFromUrl(url);
  else if (text) loadFromText(text);
  else toast('Ingresa una URL o pega el contenido M3U');
});

// File drop
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => { document.getElementById('m3u-text').value = ev.target.result; };
  reader.readAsText(file);
});
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over') });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('over');
  const file = e.dataTransfer.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => { document.getElementById('m3u-text').value = ev.target.result; };
  reader.readAsText(file);
});

// ── SEARCH ──
document.getElementById('search').addEventListener('input', renderChannels);

// ── FAVORITOS TOGGLE ──
document.getElementById('fav-toggle').addEventListener('click', () => {
  showingFavs = !showingFavs;
  document.getElementById('fav-toggle').style.color = showingFavs ? 'var(--accent)' : '';
  renderGroups();
  renderChannels();
});

// ── EPG ──
document.getElementById('epg-load-btn').addEventListener('click', () => {
  const url = document.getElementById('epg-url').value.trim();
  if (url) loadEPG(url);
  else toast('Ingresa la URL del archivo XMLTV');
});

// ── TOAST ──
let toastTimer;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ── KEYBOARD SHORTCUTS ──
document.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
  if (e.key === 'f' || e.key === 'F') document.getElementById('search').focus();
  if (e.key === 'Escape') closeModal();
  if ((e.key === 'ArrowDown' || e.key === 'ArrowUp') && currentChannel) {
    const visible = filteredChannels();
    const idx = visible.findIndex(c => c.url === currentChannel.url);
    const next = e.key === 'ArrowDown' ? idx + 1 : idx - 1;
    if (next >= 0 && next < visible.length) playChannel(visible[next]);
  }
});

// ── FULLSCREEN ──
document.getElementById('fs-btn').addEventListener('click', () => {
  const el = document.getElementById('player-area');
  if (!document.fullscreenElement) {
    (el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen).call(el);
  } else {
    (document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen).call(document);
  }
});

// ── RESTORE ──
(function restore() {
  const saved = localStorage.getItem('iptv_channels');
  if (saved) {
    channels = parseM3U(saved);
    renderGroups();
    renderChannels();
  }
  const savedUrl = localStorage.getItem('iptv_m3u_url');
  if (savedUrl) document.getElementById('m3u-url').value = savedUrl;
  const epgUrl = localStorage.getItem('iptv_epg_url');
  if (epgUrl) {
    document.getElementById('epg-url').value = epgUrl;
    loadEPG(epgUrl);
  }
})();
</script>
